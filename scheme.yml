  #          materialized: view, schema: checks
  #          (corps de check_dm_all_channels.sql, avec source() au lieu du FQDN)
  #      - models/checks/check_dm_data_media_synthesis.sql
  #          materialized: view, schema: checks
  #          (corps de check_dm_data_media_synthesis.sql)
  #   b) Comparer via dbt_utils.equality (ci-dessous, à dé-commenter).
  # ---------------------------------------------------------------------------
